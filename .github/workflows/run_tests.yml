name: UI Automation Regression Suite

# Controls when the pipeline runs
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  regression-tests:
    runs-on: ubuntu-latest  # Spins up a fresh Ubuntu Linux virtual machine

    steps:
    # Step 1: Clone your code from GitHub into the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    # Step 3: Install Google Chrome inside the Linux runner
    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install ./google-chrome-stable_current_amd64.deb

    # Step 4: Install your project dependencies (selenium, pytest, webdriver-manager)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 5: Execute your tests and generate an HTML report
    - name: Run Test Suite
      run: |
        pytest -v --html=reports/dashboard.html --self-contained-html

    # Step 6: Save the test execution HTML report so you can download it later
    - name: Upload Test Report
      if: always() # Ensures the report uploads even if a test case fails
      uses: actions/upload-artifact@v4
      with:
        name: pytest-execution-report
        path: reports/dashboard.html
        retention-days: 7